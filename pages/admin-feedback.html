<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback — Learn&Drive Admin</title>
    <link rel="stylesheet" href="../css/stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>

    <header class="ld_header">
        <a class="ld_logo" href="../index.html">
            <div class="logo-icon"><i class="ti ti-steering-wheel"></i></div>
            Learn<span class="accent">&amp;</span>Drive
        </a>
        <nav class="ld-nav">
            <a href="../index.html">Lessons</a>
            <a href="notes.html">My Notes</a>
            <a class="active" href="admin-feedback.html">Feedback</a>
        </nav>
        <div class="ld-header-right">
            <div class="user-chip" id="userChip" style="display:none;">
                <button class="user-trigger" id="userTrigger" onclick="toggleUserMenu(event)">
                    <span class="user-avatar"><i class="ti ti-user"></i></span>
                    <span class="user-name" id="userEmailLabel"></span>
                    <i class="ti ti-chevron-down lang-caret"></i>
                </button>
                <ul class="user-menu" id="userMenu" role="menu">
                    <li class="user-menu-header">
                        <span class="user-menu-name" id="userMenuNameLabel"></span>
                        <span class="role-badge" id="roleBadge"></span>
                    </li>
                    <li class="user-menu-divider"></li>
                    <li class="user-menu-item" onclick="handleLogout()">
                        <i class="ti ti-logout"></i> Log out
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main class="feedback-page">
        <h1 class="feedback-page-title"><i class="ti ti-message-2"></i> User Feedback</h1>
        <p class="feedback-page-sub" id="feedbackSummary">Loading...</p>
        <div id="feedbackListContainer" class="feedback-list"></div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/admin-feedback.js"></script>
</body>
</html>
